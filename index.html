<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portail de projets Clickdroit — dashboard engineering." />
  <title>Dashboard — Clickdroit</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <!-- ── En-tête ─────────────────────────────────────────────────────────── -->
  <header role="banner">
    <div class="header__brand">
      <span class="header__logo" aria-hidden="true">⬡</span>
      <h1>Clickdroit Portal</h1>
      <span class="header__env" aria-label="Environnement : production">PROD</span>
    </div>
    <div class="header__controls">
      <button id="theme-toggle"
              aria-label="Thème actuel : sombre — appuyer pour changer (t)"
              aria-pressed="true">☀</button>
    </div>
  </header>

  <!-- ── Layout ──────────────────────────────────────────────────────────── -->
  <div class="layout">

    <!-- Barre latérale : métriques + terminal -->
    <aside class="sidebar" role="complementary" aria-label="Panneau système">

      <!-- Métriques -->
      <section class="panel metrics-panel" aria-labelledby="metrics-title">
        <h2 class="panel__title" id="metrics-title">// METRICS</h2>
        <ul class="metrics-list" role="list">
          <li>
            <span class="metric__label">UPTIME</span>
            <span class="metric__value" id="metric-uptime" aria-live="polite" aria-atomic="true">—</span>
          </li>
          <li>
            <span class="metric__label">LATENCY</span>
            <span class="metric__value" id="metric-latency" aria-live="polite" aria-atomic="true">—</span>
          </li>
          <li>
            <span class="metric__label">REQUESTS</span>
            <span class="metric__value" id="metric-requests" aria-live="polite" aria-atomic="true">—</span>
          </li>
          <li>
            <span class="metric__label">VERSION</span>
            <span class="metric__value">v2.0.0</span>
          </li>
          <li>
            <span class="metric__label">ENV</span>
            <span class="metric__value env-badge">PROD</span>
          </li>
        </ul>
      </section>

      <!-- Terminal simulé -->
      <section class="panel terminal-panel" aria-labelledby="terminal-title">
        <h2 class="panel__title" id="terminal-title">// TERMINAL</h2>
        <div id="terminal-output"
             role="log"
             aria-live="polite"
             aria-label="Sortie du terminal"
             aria-relevant="additions"></div>
        <div class="terminal-input-line">
          <span class="terminal-prompt" aria-hidden="true">❯</span>
          <label for="terminal-input" class="sr-only">Commande terminal</label>
          <input type="text"
                 id="terminal-input"
                 autocomplete="off"
                 spellcheck="false"
                 placeholder="help"
                 aria-describedby="terminal-title" />
        </div>
      </section>

    </aside>

    <!-- Zone de contenu principale -->
    <div class="content">

      <!-- Barre d'outils : recherche, filtres, tri -->
      <div class="toolbar" role="search" aria-label="Recherche et filtres projets">
        <div class="search-box">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <label for="search" class="sr-only">Rechercher des projets</label>
          <input type="search"
                 id="search"
                 placeholder="Rechercher… (appuyer sur / pour focus)"
                 aria-label="Rechercher des projets" />
        </div>
        <div class="filters" id="tag-filters" role="group" aria-label="Filtrer par technologie">
          <button class="filter-btn active"
                  data-filter="all"
                  aria-pressed="true">Tous</button>
        </div>
        <div>
          <label for="sort-select" class="sr-only">Trier par</label>
          <select id="sort-select" aria-label="Trier les projets par">
            <option value="index">Ordre défaut</option>
            <option value="name">Nom (A–Z)</option>
            <option value="status">Statut</option>
            <option value="date">Mise à jour</option>
          </select>
        </div>
      </div>

      <!-- Grille de projets (générée par JS) -->
      <main id="projects-grid"
            role="main"
            aria-label="Projets"
            aria-live="polite"
            aria-relevant="all"></main>

      <!-- Timeline / journal d'événements -->
      <section class="panel timeline-panel" aria-labelledby="timeline-title">
        <h2 class="panel__title" id="timeline-title">// EVENT LOG</h2>
        <div id="timeline"
             role="list"
             aria-live="polite"
             aria-label="Journal des événements système"
             aria-relevant="additions"></div>
      </section>

    </div>
  </div>

  <!-- ── Pied de page ─────────────────────────────────────────────────────── -->
  <footer role="contentinfo">
    <span>&copy; <span id="yr"></span> Clickdroit — Tous droits réservés</span>
    <span class="footer__shortcuts" aria-label="Raccourcis clavier disponibles">
      Raccourcis :
      <kbd title="Focus recherche">/</kbd> recherche ·
      <kbd title="Changer de thème">t</kbd> thème ·
      <kbd title="Ouvrir projet (g puis numéro)">g+n</kbd> ouvrir projet
    </span>
  </footer>

  <script src="assets/js/main.js" defer type="module"></script>

</body>
</html>
