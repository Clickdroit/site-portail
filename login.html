<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connexion au portail Clickdroit." />
  <title>Connexion — Clickdroit</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      animation: fadeUp .5s cubic-bezier(.4,0,.2,1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .login-card__header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-card__logo {
      font-size: 2.4rem;
      color: var(--accent);
      margin-bottom: 12px;
      display: block;
    }

    .login-card__header h1 {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 6px;
    }

    .login-card__header p {
      color: var(--muted);
      font-size: .85rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .login-field label {
      font-family: var(--font-mono);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .login-field input {
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .9rem;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .login-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      outline: none;
    }

    .login-btn {
      padding: 12px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
    }

    .login-btn:hover {
      opacity: .9;
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      color: var(--down);
      font-size: .82rem;
      text-align: center;
      min-height: 1.5em;
      font-family: var(--font-mono);
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
    }

    .login-footer kbd {
      font-family: var(--font-mono);
      font-size: .65rem;
      padding: 1px 5px;
      background: var(--surface-2);
      border: 1px solid var(--border-h);
      border-radius: 3px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__header">
        <span class="login-card__logo" aria-hidden="true">⬡</span>
        <h1>Clickdroit Portal</h1>
        <p>Connectez-vous pour accéder au dashboard</p>
      </div>

      <form class="login-form" id="login-form">
        <div class="login-field">
          <label for="login-username">Utilisateur</label>
          <input type="text" id="login-username" autocomplete="username"
                 placeholder="admin" required autofocus />
        </div>

        <div class="login-field">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>

        <p class="login-error" id="login-error" role="alert" aria-live="polite"></p>

        <button type="submit" class="login-btn" id="login-btn">
          Se connecter
        </button>
      </form>

      <div class="login-footer">
        Défaut : <kbd>admin</kbd> / <kbd>admin</kbd>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('portal-token');
    if (token) {
      fetch('/portal/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => { if (res.ok) window.location.href = 'index.html'; })
      .catch(() => {});
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Connexion…';

      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch('/portal/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Erreur de connexion.';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
          return;
        }

        localStorage.setItem('portal-token', data.token);
        localStorage.setItem('portal-user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = 'Impossible de contacter le serveur.';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });

    // Apply theme
    const theme = localStorage.getItem('portal-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
